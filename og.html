<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>panproto OG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #0c0b0a;
    --fg:    #ece8e1;
    --dim:   #9a9590;
    --panel: #c4a882;
    --red:   #e63946;
    --blue:  #4a90d9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; border: 0; }
  html, body {
    width: 1200px; height: 630px;
    overflow: hidden;
  }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    position: relative;
  }
  .grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(196,168,130,0.06) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  .grain {
    position: absolute; inset: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
    pointer-events: none;
  }
  .glow {
    position: absolute;
    width: 700px; height: 700px; border-radius: 50%;
    left: 50%; top: 50%; transform: translate(-50%, -50%);
    background: radial-gradient(circle,
      rgba(230,57,70,0.05) 0%,
      rgba(74,144,217,0.04) 45%,
      transparent 70%);
    pointer-events: none;
  }
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.40) 100%);
    pointer-events: none;
  }

  .hero {
    position: absolute;
    left: 80px;
    bottom: 110px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 400;
    color: var(--dim);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding-left: 8px;
  }
  .wordmark {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 156px;
    font-weight: 500;
    color: var(--fg);
    letter-spacing: -0.04em;
    line-height: 1.0;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="grain"></div>
  <div class="glow"></div>
  <div class="vignette"></div>

  <div class="hero">
    <div class="tagline">schematic version control</div>
    <div class="wordmark">panproto</div>
  </div>
</body>
</html>
