<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>panproto | schematic version control</title>
<meta name="description" content="One engine for schematic version control within and across any schema language. Built on generalized algebraic theories for provably correct migrations.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --fg: #ece8e1;
    --fg-dim: #9a9590;
    --fg-accent: #e63946;          /* patch-cable red — primary */
    --fg-accent-light: #f06b76;
    --fg-accent-2: #4a90d9;        /* patch-cable blue — secondary */
    --fg-accent-2-light: #7fb4e6;
    --fg-panel: #c4a882;
    --bg: #0c0b0a;
    --bg-card: #141312;
    --border: #2a2825;
    --mono: 'Space Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
    --ease-luxury: cubic-bezier(0.165, 0.84, 0.44, 1);
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--mono);
    font-weight: 400;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
    position: relative;
  }

  /* subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
    pointer-events: none;
    z-index: 100;
  }

  /* vignette — darkens edges, draws focus to center */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 65%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
    z-index: 99;
  }

  /* dot grid — subtle PCB/hardware texture */
  .dot-grid {
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(196,168,130,0.04) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  /* ambient glow — follows cursor via JS */
  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(230,57,70,0.05) 0%, rgba(74,144,217,0.04) 45%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: left 0.8s var(--ease-luxury), top 0.8s var(--ease-luxury);
    z-index: 0;
  }

  .container {
    max-width: 540px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3.5rem;
    position: relative;
    z-index: 1;
  }

  /* ---- Logo ---- */
  .logo-wrap {
    animation: fadeIn 1.2s var(--ease-luxury) both;
  }

  .logo-wrap svg {
    width: 120px;
    height: 120px;
  }

  /* Rails: appear immediately */
  .logo-wrap svg .rail {
    fill: var(--fg-dim);
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3));
  }

  /* Modules: slide down from top rail into place */
  .logo-wrap svg .module {
    fill: var(--fg-panel);
    filter: drop-shadow(1px 0 0.5px rgba(0,0,0,0.25));
    transform-box: fill-box;
    transform-origin: top center;
    transform: scaleY(0);
    animation: moduleSlide 0.5s var(--ease-luxury) forwards;
  }
  .logo-wrap svg .module:nth-child(3) { animation-delay: 0.3s; }
  .logo-wrap svg .module:nth-child(4) { animation-delay: 0.4s; }
  .logo-wrap svg .module:nth-child(5) { animation-delay: 0.5s; }
  .logo-wrap svg .module:nth-child(6) { animation-delay: 0.6s; }

  /* Jacks: fade in after modules */
  .logo-wrap svg .jack {
    fill: var(--bg);
    opacity: 0;
    animation: jackIn 0.2s var(--ease-luxury) forwards;
  }
  .logo-wrap svg .jack:nth-child(7)  { animation-delay: 0.6s; }
  .logo-wrap svg .jack:nth-child(8)  { animation-delay: 0.65s; }
  .logo-wrap svg .jack:nth-child(9)  { animation-delay: 0.7s; }
  .logo-wrap svg .jack:nth-child(10) { animation-delay: 0.72s; }
  .logo-wrap svg .jack:nth-child(11) { animation-delay: 0.74s; }
  .logo-wrap svg .jack:nth-child(12) { animation-delay: 0.76s; }
  .logo-wrap svg .jack:nth-child(13) { animation-delay: 0.78s; }
  .logo-wrap svg .jack:nth-child(14) { animation-delay: 0.8s; }
  .logo-wrap svg .jack:nth-child(15) { animation-delay: 0.82s; }
  .logo-wrap svg .jack:nth-child(16) { animation-delay: 0.84s; }
  .logo-wrap svg .jack:nth-child(17) { animation-delay: 0.86s; }
  .logo-wrap svg .jack:nth-child(18) { animation-delay: 0.88s; }
  .logo-wrap svg .jack:nth-child(19) { animation-delay: 0.9s; }
  .logo-wrap svg .jack:nth-child(20) { animation-delay: 0.92s; }

  /* Cables: draw in last, red + blue patch cables */
  .logo-wrap svg .cable {
    stroke-width: 3.4;
    fill: none;
    stroke-linecap: round;
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: drawCable 1.6s var(--ease-luxury) forwards;
  }
  .logo-wrap svg .cable-red {
    stroke: var(--fg-accent);
    filter: drop-shadow(0 0 0.5px rgba(0,0,0,0.35)) drop-shadow(0 0 6px rgba(230,57,70,0.5));
  }
  .logo-wrap svg .cable-blue {
    stroke: var(--fg-accent-2);
    filter: drop-shadow(0 0 0.5px rgba(0,0,0,0.35)) drop-shadow(0 0 6px rgba(74,144,217,0.5));
  }
  .logo-wrap svg .cable:nth-child(21) { animation-delay: 1.4s; }
  .logo-wrap svg .cable:nth-child(22) { animation-delay: 1.8s; }

  /* ---- Title ---- */
  .title {
    text-align: center;
    animation: fadeIn 1s var(--ease-luxury) 0.4s both;
  }

  .title h1 {
    font-family: var(--display);
    font-weight: 500;
    font-size: 3.25rem;
    letter-spacing: -0.03em;
    color: var(--fg);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .title .tagline {
    font-size: 0.7rem;
    color: var(--fg-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 400;
  }

  /* ---- Description ---- */
  .desc {
    text-align: center;
    line-height: 1.7;
    font-size: 0.875rem;
    color: var(--fg-dim);
    max-width: 440px;
    animation: fadeIn 1s var(--ease-luxury) 0.7s both;
  }

  .desc em {
    font-style: italic;
    color: #e8a020;
    font-family: var(--display);
    font-size: 0.95rem;
  }

  /* ---- Separator ---- */
  .sep {
    width: 1px;
    height: 32px;
    background: var(--border);
    animation: fadeIn 1s var(--ease-luxury) 1s both;
  }

  /* ---- Links ---- */
  .links {
    display: flex;
    gap: 2rem;
    animation: fadeIn 1s var(--ease-luxury) 1.1s both;
  }

  .links a {
    font-size: 0.8rem;
    color: var(--fg-dim);
    text-decoration: none;
    letter-spacing: 0.06em;
    position: relative;
    padding-bottom: 2px;
    transition: color 0.4s var(--ease-luxury);
  }

  .links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 1px;
    background: #e8a020;
    transition: width 0.4s var(--ease-luxury);
  }

  .links a:hover {
    color: #f0c060;
  }

  .links a:hover::after {
    width: 100%;
  }

  /* ---- Footer ---- */
  .footer {
    position: fixed;
    bottom: 1.5rem;
    font-size: 0.6rem;
    color: var(--fg-dim);
    opacity: 0.4;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    animation: fadeIn 1s var(--ease-luxury) 1.4s both;
  }

  /* ---- Animations ---- */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes moduleSlide {
    from { transform: scaleY(0); }
    to { transform: scaleY(1); }
  }

  @keyframes jackIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes drawCable {
    to { stroke-dashoffset: 0; }
  }

  /* ---- Responsive ---- */
  @media (max-width: 480px) {
    .title h1 { font-size: 2.25rem; }
    .logo-wrap svg { width: 90px; height: 90px; }
    .links { gap: 1.5rem; }
    .container { gap: 2.5rem; }
  }
</style>
</head>
<body>

<div class="dot-grid"></div>
<div class="glow" id="glow"></div>

<div class="container">

  <!-- Logo: eurorack modular synth -->
  <div class="logo-wrap">
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <!-- Rack rails (static) -->
      <rect class="rail" x="4" y="16" width="112" height="5" rx="2"/>
      <rect class="rail" x="4" y="99" width="112" height="5" rx="2"/>
      <!-- Modules (slide down from top rail) -->
      <rect class="module" x="8" y="21" width="18" height="78"/>
      <rect class="module" x="28" y="21" width="26" height="78"/>
      <rect class="module" x="56" y="21" width="14" height="78"/>
      <rect class="module" x="72" y="21" width="40" height="78"/>
      <!-- Jack points (fade in) -->
      <circle class="jack" cx="17" cy="38" r="2.5"/>
      <circle class="jack" cx="17" cy="54" r="2.5"/>
      <circle class="jack" cx="17" cy="84" r="2.5"/>
      <circle class="jack" cx="41" cy="38" r="2.5"/>
      <circle class="jack" cx="36" cy="62" r="2.5"/>
      <circle class="jack" cx="46" cy="62" r="2.5"/>
      <circle class="jack" cx="41" cy="84" r="2.5"/>
      <circle class="jack" cx="63" cy="38" r="2.5"/>
      <circle class="jack" cx="63" cy="62" r="2.5"/>
      <circle class="jack" cx="85" cy="38" r="2.5"/>
      <circle class="jack" cx="99" cy="38" r="2.5"/>
      <circle class="jack" cx="85" cy="62" r="2.5"/>
      <circle class="jack" cx="99" cy="62" r="2.5"/>
      <circle class="jack" cx="92" cy="84" r="2.5"/>
      <!-- Patch cables (draw in last): red + blue -->
      <path class="cable cable-red" d="M 17 84 C 24 109 56 109 63 62"/>
      <path class="cable cable-blue" d="M 46 62 C 53 82 78 82 85 62"/>
    </svg>
  </div>

  <!-- Title -->
  <div class="title">
    <h1>panproto</h1>
    <div class="tagline">schematic version control</div>
  </div>

  <!-- Description -->
  <p class="desc">
    One engine for schematic version control within and across
    any schema language: SQL, Protobuf, GraphQL, JSON Schema, ATProto, and many more.
    Built on <em>generalized algebraic theories</em>
    for provably correct migrations.
  </p>

  <div class="sep"></div>

  <!-- Links -->
  <div class="links">
    <a href="https://github.com/panproto/panproto/" target="_blank" rel="noopener">Code</a>
    <a href="https://panproto.dev/protolab/" target="_blank" rel="noopener">Lab</a>
  </div>

</div>

<div class="footer">MIT License</div>

<script>
  // Cursor-reactive ambient glow
  const glow = document.getElementById('glow');
  document.addEventListener('mousemove', (e) => {
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
  });
</script>

</body>
</html>
