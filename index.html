<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>panproto | universal schema migrations</title>
<meta name="description" content="A universal schema migration engine grounded in category theory. Every schema language becomes a model of a common algebraic structure.">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap');

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --fg: #e8e4df;
    --fg-dim: #8a857e;
    --fg-accent: #c4a882;
    --bg: #0c0b0a;
    --bg-card: #13120f;
    --border: #2a2722;
    --mono: 'DM Mono', monospace;
    --serif: 'Instrument Serif', serif;
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--mono);
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
    position: relative;
  }

  /* subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
    pointer-events: none;
    z-index: 100;
  }

  /* ambient glow behind the logo */
  .glow {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,168,130,0.06) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    pointer-events: none;
  }

  .container {
    max-width: 540px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
    position: relative;
    z-index: 1;
  }

  /* ---- Logo ---- */
  .logo-wrap {
    animation: fadeIn 1.2s ease both;
  }

  .logo-wrap svg {
    width: 120px;
    height: 120px;
  }

  .logo-wrap svg .node {
    fill: var(--fg-accent);
    opacity: 0;
    animation: nodeIn 0.5s ease forwards;
  }
  .logo-wrap svg .node:nth-child(1) { animation-delay: 0.3s; }
  .logo-wrap svg .node:nth-child(2) { animation-delay: 0.45s; }
  .logo-wrap svg .node:nth-child(3) { animation-delay: 0.6s; }
  .logo-wrap svg .node:nth-child(4) { animation-delay: 0.75s; }
  .logo-wrap svg .node:nth-child(5) { animation-delay: 0.55s; }

  .logo-wrap svg .edge {
    stroke: var(--fg-dim);
    stroke-width: 1;
    fill: none;
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: drawEdge 1s ease forwards;
  }
  .logo-wrap svg .edge:nth-child(6) { animation-delay: 0.8s; }
  .logo-wrap svg .edge:nth-child(7) { animation-delay: 0.9s; }
  .logo-wrap svg .edge:nth-child(8) { animation-delay: 1.0s; }
  .logo-wrap svg .edge:nth-child(9) { animation-delay: 1.1s; }
  .logo-wrap svg .edge:nth-child(10) { animation-delay: 1.2s; }
  .logo-wrap svg .edge:nth-child(11) { animation-delay: 1.05s; }

  .logo-wrap svg .morphism {
    stroke: var(--fg-accent);
    stroke-width: 1.5;
    fill: none;
    opacity: 0.5;
    stroke-dasharray: 4 6;
    stroke-dashoffset: 200;
    animation: drawEdge 1.2s ease forwards;
    animation-delay: 1.4s;
  }

  /* ---- Title ---- */
  .title {
    text-align: center;
    animation: fadeIn 1s ease 0.4s both;
  }

  .title h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 2.75rem;
    letter-spacing: -0.02em;
    color: var(--fg);
    line-height: 1;
    margin-bottom: 0.35rem;
  }

  .title .tagline {
    font-size: 0.75rem;
    color: var(--fg-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ---- Description ---- */
  .desc {
    text-align: center;
    line-height: 1.7;
    font-size: 0.875rem;
    color: var(--fg-dim);
    max-width: 440px;
    animation: fadeIn 1s ease 0.7s both;
  }

  .desc em {
    font-style: italic;
    color: var(--fg-accent);
    font-family: var(--serif);
    font-size: 0.95rem;
  }

  /* ---- Separator ---- */
  .sep {
    width: 1px;
    height: 32px;
    background: var(--border);
    animation: fadeIn 1s ease 1s both;
  }

  /* ---- Links ---- */
  .links {
    display: flex;
    gap: 2rem;
    animation: fadeIn 1s ease 1.1s both;
  }

  .links a {
    font-size: 0.8rem;
    color: var(--fg-dim);
    text-decoration: none;
    letter-spacing: 0.06em;
    position: relative;
    padding-bottom: 2px;
    transition: color 0.3s;
  }

  .links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--fg-accent);
    transition: width 0.3s ease;
  }

  .links a:hover {
    color: var(--fg);
  }

  .links a:hover::after {
    width: 100%;
  }

  /* ---- Footer ---- */
  .footer {
    position: fixed;
    bottom: 1.5rem;
    font-size: 0.6rem;
    color: var(--fg-dim);
    opacity: 0.4;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    animation: fadeIn 1s ease 1.4s both;
  }

  /* ---- Animations ---- */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes nodeIn {
    from { opacity: 0; r: 0; }
    to { opacity: 1; }
  }

  @keyframes drawEdge {
    to { stroke-dashoffset: 0; }
  }

  /* ---- Responsive ---- */
  @media (max-width: 480px) {
    .title h1 { font-size: 2rem; }
    .logo-wrap svg { width: 90px; height: 90px; }
    .links { gap: 1.5rem; }
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="container">

  <!-- Logo: commutative diagram / morphism graph -->
  <div class="logo-wrap">
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <!-- Nodes: five sorts arranged as a pentagonal structure -->
      <circle class="node" cx="60" cy="16" r="3.5"/>
      <circle class="node" cx="102" cy="46" r="3.5"/>
      <circle class="node" cx="86" cy="96" r="3.5"/>
      <circle class="node" cx="34" cy="96" r="3.5"/>
      <circle class="node" cx="18" cy="46" r="3.5"/>

      <!-- Edges: outer pentagon -->
      <line class="edge" x1="60" y1="16" x2="102" y2="46"/>
      <line class="edge" x1="102" y1="46" x2="86" y2="96"/>
      <line class="edge" x1="86" y1="96" x2="34" y2="96"/>
      <line class="edge" x1="34" y1="96" x2="18" y2="46"/>
      <line class="edge" x1="18" y1="46" x2="60" y2="16"/>

      <!-- Inner star edges: the morphisms connecting across -->
      <line class="edge" x1="60" y1="16" x2="86" y2="96"/>

      <!-- Central morphism arrows (dashed) — theory morphisms -->
      <path class="morphism" d="M 60 16 Q 60 56 34 96"/>
      <path class="morphism" d="M 102 46 Q 60 56 34 96"/>
      <path class="morphism" d="M 18 46 Q 60 56 86 96"/>
      <path class="morphism" d="M 60 16 Q 45 56 18 46" style="animation-delay:1.5s"/>
      <path class="morphism" d="M 102 46 Q 75 56 60 16" style="animation-delay:1.55s; opacity:0.3"/>

    </svg>
  </div>

  <!-- Title -->
  <div class="title">
    <h1>panproto</h1>
    <div class="tagline">universal schema migrations</div>
  </div>

  <!-- Description -->
  <p class="desc">
    One engine for schema migrations across
    SQL, Protobuf, GraphQL, JSON Schema, ATProto, and 
    any other current or future schema language.
    Built on <em>generalized algebraic theories</em> 
    for provably correct migrations.
  </p>

  <div class="sep"></div>

  <!-- Links -->
  <div class="links">
    <a href="https://github.com/panproto/panproto/" target="_blank" rel="noopener">Code</a>
    <a href="https://panproto.github.io/tutorial/" target="_blank" rel="noopener">Tutorial</a>
  </div>

</div>

<div class="footer">MIT License</div>

</body>
</html>
